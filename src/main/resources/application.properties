# ???????????????????????????????????????????????????????????????
# Turnero Canchas de F·tbol - application.properties
# ???????????????????????????????????????????????????????????????

spring.application.name=turnero-backend
server.port=${PORT:8080}

# ???????????????????????????????????????????????????????????????
# H2 Database (ACTIVO PARA DESARROLLO)
# ???????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:h2:mem:turnero_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Ejecutar data.sql despuķs de crear tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never


# ???????????????????????????????????????????????????????????????
# MySQL Database (COMENTADO - PARA PRODUCCIėN)
# ???????????????????????????????????????????????????????????????
# spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/turnero_db?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=${DB_USERNAME:root}
# spring.datasource.password=${DB_PASSWORD:root}
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# ???????????????????????????????????????????????????????????????
# JPA / Hibernate
# ???????????????????????????????????????????????????????????????
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false


# ???????????????????????????????????????????????????????????????
# Swagger / OpenAPI
# ???????????????????????????????????????????????????????????????
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.cache.disabled=true
springdoc.swagger-ui.groups-order=asc


# ???????????????????????????????????????????????????????????????
# Email (JavaMail / SMTP)
# ???????????????????????????????????????????????????????????????
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:tu_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${FROM_EMAIL:noreply@turnero.com}
app.mail.from-name=${FROM_NAME:Turnero Canchas}


# ???????????????????????????????????????????????????????????????
# CORS
# ???????????????????????????????????????????????????????????????
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}


# ???????????????????????????????????????????????????????????????
# Logging
# ???????????????????????????????????????????????????????????????
logging.level.root=INFO
logging.level.ar.edu.utn.turnero=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO


# ???????????????????????????????????????????????????????????????
# Jackson
# ???????????????????????????????????????????????????????????????
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Argentina/Buenos_Aires